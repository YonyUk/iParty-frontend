<div class="page">
  <form class="register" action="submit" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="selector">
      <div class="icons">
        <ng-icon
          class="icon"
          name="bootstrapPerson"
          [class.left-centered]="accountType !== 'Host'"
          [class.moved-left]="accountType === 'Host'"
          size="70"
          color="rgba(255,255,255,0.5)"
        ></ng-icon>
        <ng-icon
          class="icon"
          name="bootstrapHouses"
          [class.moved-right]="accountType !== 'Host'"
          [class.right-centered]="accountType === 'Host'"
          size="70"
          color="rgba(255,255,255,0.5)"
        ></ng-icon>
      </div>
      <div class="toogle">
        <lib-toogle-button (valueChanged)="onAccountTypeChanged($event)"></lib-toogle-button>
      </div>
    </div>
    @if (error) {
      <div class="error-box">
        <small>{{ errorMessage }}</small>
      </div>
    }
    @if (validationErrorMessage) {
      <div class="error-box">
        <small>{{ validationErrorMessage }}</small>
      </div>
    }
    <div class="personal-data">
      <input
        type="text"
        formControlName="username"
        id="username-input"
        placeholder="username"
        [class.invalid-field]="usernameError"
      />
      <input
        type="email"
        formControlName="email"
        id="email-input"
        placeholder="email"
        [class.invalid-field]="emailError"
      />
    </div>
    <div class="password">
      <input
        type="password"
        formControlName="password"
        id="password-input"
        placeholder="password"
        [class.invalid-field]="passwordError"
      />
      <input
        type="password"
        formControlName="confirmPassword"
        id="password-confirm-input"
        placeholder="confirm"
      />
    </div>
    <div class="link">
      <small>ALready hav an account? <a href="users/login">Log in</a></small>
    </div>
    <div class="controls">
      <button type="submit">Register</button>
      <button type="reset" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
