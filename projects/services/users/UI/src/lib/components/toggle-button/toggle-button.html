<div class="container">
  <label class="switch">
    <input type="checkbox" id="toggleCrossfade" [(ngModel)]="value" (ngModelChange)="onChange(value)">
    <span class="slider">
      <span class="switch-text">
        <span class="text-on">Host</span>
        <span class="text-off">User</span>
      </span>
    </span>
  </label>
</div>
